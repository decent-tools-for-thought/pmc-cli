name: Weekly Rebuild

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

jobs:
  rebuild-and-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6

      - name: Install project and dev dependencies
        run: uv sync --group dev

      - name: Build distributions
        run: uv run python -m build

      - name: Verify wheel install
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install --upgrade pip
          .venv-wheel/bin/python -m pip install --no-deps dist/*.whl
          .venv-wheel/bin/python -c "import pmc_tool"
          .venv-wheel/bin/pmc --help >/dev/null

      - name: Verify sdist install
        run: |
          python -m venv .venv-sdist
          .venv-sdist/bin/python -m pip install --upgrade pip setuptools wheel
          .venv-sdist/bin/python -m pip install --no-build-isolation dist/*.tar.gz
          .venv-sdist/bin/python -c "import pmc_tool"
          .venv-sdist/bin/pmc --help >/dev/null
